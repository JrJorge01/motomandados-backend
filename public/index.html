<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motomandados</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:10px;
}
</style>
</head>

<body>

<h2>Login</h2>

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>

<hr>

<div id="app" style="display:none;">
  <h2>Enviar pedido</h2>
  <textarea id="mensaje"></textarea>
  <button onclick="enviar()">Enviar</button>
</div>

<div id="adminPanel" style="display:none;">
  <h2>Pedidos</h2>
  <ul id="lista"></ul>
</div>

<script>

let usuarioActual="";

// LOGIN
function login(){
  fetch('https://motomandados-backend-sa3n.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(data=>{

    app.style.display='none';
    adminPanel.style.display='none';

    if(data.ok){
      usuarioActual=user.value;

      if(data.role==="admin"){
        adminPanel.style.display='block';
        cargarPedidos();
      }else{
        app.style.display='block';
      }

    }else{
      alert("Login incorrecto");
    }

  });
}

// REGISTRAR
function registrar(){
  fetch('https://motomandados-backend-sa3n.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>alert(d.ok?"Registrado":"Error"));
}

// ENVIAR
function enviar(){
  fetch('https://motomandados-backend-sa3n.onrender.com/mensaje',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mensaje:mensaje.value,
      user:usuarioActual,
      lat:0,
      lng:0,
      direccion:"-",
      telefono:"-"
    })
  })
  .then(()=>alert("Pedido enviado"));
}

// LISTAR PEDIDOS ✅ (CON VER EN MAPA COMO ANTES)
function cargarPedidos(){

  fetch('https://motomandados-backend-sa3n.onrender.com/pedidos')
  .then(r=>r.json())
  .then(data=>{

    lista.innerHTML="";

    data.forEach(p=>{

      const li = document.createElement('li');

      li.innerHTML = `
        ${p.user}: ${p.mensaje} <br>
        📍 (${p.lat}, ${p.lng}) <br>

        <a href="https://www.google.com/maps?q=${p.lat},${p.lng}" target="_blank">
          Ver en mapa
        </a>

        <hr>
      `;

      lista.appendChild(li);
    });

  });
}

</script>

</body>
</html>
